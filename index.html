<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Pengadaan — BPBJ Kota Surakarta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  </head>
<body class="bg-slate-50 text-slate-800">

  <div id="modal-mj-body" class="p-4 bg-white rounded-lg shadow mt-5">
    <h3 class="text-lg font-bold mb-4" id="modal-title">Detail Paket</h3>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse" id="t-modal-mj">
        <thead id="modal-mj-thead" class="bg-slate-200">
          <tr>
            <th class="p-2 border">#</th>
            <th class="p-2 border">Satker / OPD</th>
            <th class="p-2 border">Nama Paket</th> <th class="p-2 border">Metode</th>
            <th class="p-2 border">Jenis</th>
            <th class="p-2 border">Sumber Dana</th>
            <th class="p-2 border">Pagu (Rp)</th>
            <th class="p-2 border">Nilai Kontrak (Rp)</th>
            <th class="p-2 border">Penyedia / Status</th>
          </tr>
        </thead>
        <tbody id="modal-mj-tbody">
          <tr><td colspan="9" class="text-center text-slate-400 py-8 text-xs">Pilih data pada chart untuk melihat detail...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Format Uang
    function formatRupiah(angka) {
      if (!angka || isNaN(angka)) return 'Rp 0';
      return 'Rp ' + parseInt(angka).toLocaleString('id-ID');
    }

    // ============================================================
    // FUNGSI PERBAIKAN: MENAMPILKAN DETAIL KE MODAL
    // ============================================================
    function showDetailModal(periode, metode, jenis) {
      const tbody = document.getElementById('modal-mj-tbody');
      const modalTitle = document.getElementById('modal-title');
      
      modalTitle.innerText = `Detail Paket: ${metode} - ${jenis}`;
      tbody.innerHTML = '<tr><td colspan="9" class="text-center text-slate-500 py-4">Memuat data...</td></tr>';
      
      // Memanggil fungsi Google Apps Script
      google.script.run
        .withSuccessHandler(function(responseStr) {
          const response = JSON.parse(responseStr);
          
          if (response.status === 'error') {
            tbody.innerHTML = `<tr><td colspan="9" class="text-center text-red-500 py-4">Error: ${response.message}</td></tr>`;
            return;
          }

          const data = response.data;
          let html = '';
          
          if(data.length === 0) {
            html = '<tr><td colspan="9" class="text-center text-slate-500 py-4">Tidak ada data ditemukan</td></tr>';
          } else {
            // Looping data
            data.forEach((item, index) => {
              html += `
                <tr class="border-b hover:bg-slate-50">
                  <td class="p-2">${index + 1}</td>
                  <td class="p-2">${item.satker}</td>
                  
                  <td class="p-2 font-medium text-blue-700">${item.nama_paket || 'Nama Paket Kosong'}</td>
                  
                  <td class="p-2">${item.metode}</td>
                  <td class="p-2">${item.jenis}</td>
                  <td class="p-2">${item.sumber_dana}</td>
                  <td class="p-2 text-right">${formatRupiah(item.pagu)}</td>
                  <td class="p-2 text-right">${formatRupiah(item.kontrak)}</td>
                  <td class="p-2">${item.status}</td>
                </tr>
              `;
            });
          }
          tbody.innerHTML = html;
        })
        .withFailureHandler(function(error) {
          tbody.innerHTML = '<tr><td colspan="9" class="text-center text-red-500 py-4">Gagal terhubung ke server</td></tr>';
          console.error(error);
        })
        .getDetailMetodeJenis(periode, metode, jenis);
    }

    // Contoh trigger pemanggilan (Bisa Anda pasang di event klik Chart.js)
    // showDetailModal('2026_05', 'Tender', 'Pekerjaan Konstruksi');
  </script>
</body>
</html>
